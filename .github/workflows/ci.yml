name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ailang
        run: |
          curl -sL https://github.com/sunholo-data/ailang/releases/download/v0.9.0/linux.x64.ailang.tar.gz | tar -xz
          sudo mv ailang /usr/local/bin/
          ailang --version

      - name: Type-check all 17 modules
        run: ./bin/docparse --check

      - name: Run inline tests (60+ test cases)
        run: ./bin/docparse --test

  benchmark:
    name: Structural Benchmark (34 files)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install ailang
        run: |
          curl -sL https://github.com/sunholo-data/ailang/releases/download/v0.9.0/linux.x64.ailang.tar.gz | tar -xz
          sudo mv ailang /usr/local/bin/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Run structural benchmark
        run: uv run benchmarks/run_benchmarks.py --suite office

      - name: Verify 100% score
        run: |
          RESULT=$(uv run benchmarks/run_benchmarks.py --suite office --json 2>/dev/null)
          FAILURES=$(echo "$RESULT" | python3 -c "
          import json, sys
          results = json.load(sys.stdin)
          failures = [r for r in results if r.get('score', 0) < 1.0]
          if failures:
              for f in failures:
                  print(f'FAIL: {f[\"file\"]} ({f[\"score\"]:.0%})')
              sys.exit(1)
          print(f'All {len(results)} files at 100%')
          ")
          echo "$FAILURES"
