  <path d="M9 5a1.5 1.5 0 011.5-1.5h7.086a1.5 1.5 0 011.06.44l4.414 4.414a1.5 1.5 0 01.44 1.06V27a1.5 1.5 0 01-1.5 1.5h-12A1.5 1.5 0 019 27V5z" fill="#0c1d3a" stroke="#2563eb" stroke-width="1.2"/>
  <!-- Fold -->
  <path d="M17.5 3.5V8a1 1 0 001 1H23" stroke="#2563eb" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Extraction beams — staggered, emerging from doc content -->
  <rect x="12" y="12" width="8" height="1.8" rx="0.9" fill="#2563eb" opacity="0.95">
    <animate attributeName="width" values="8;11;8" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="12" y="15.5" width="6" height="1.8" rx="0.9" fill="#3b82f6" opacity="0.75">
    <animate attributeName="width" values="6;9.5;6" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="12" y="19" width="9" height="1.8" rx="0.9" fill="#60a5fa" opacity="0.55">
    <animate attributeName="width" values="9;7;9" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="12" y="22.5" width="5" height="1.8" rx="0.9" fill="#93c5fd" opacity="0.35">
    <animate attributeName="width" values="5;8;5" dur="2s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  <!-- Parse indicator — small chevron pulse at right edge -->
  <path d="M21 15l2 2-2 2" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <defs>
    <radialGradient id="logoGlow" cx="0.5" cy="0.5" r="0.5">
