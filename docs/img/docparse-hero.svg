<svg viewBox="0 0 480 160" width="480" height="160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="480" height="160" rx="8" fill="url(#bgGrad)"/>

  <!-- Atmospheric glow behind center -->
  <ellipse cx="240" cy="80" rx="120" ry="60" fill="url(#glow1)"/>

  <!-- Subtle grid lines for "precision" feel -->
  <line x1="0" y1="40" x2="480" y2="40" stroke="rgba(37,99,235,0.04)" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="480" y2="80" stroke="rgba(37,99,235,0.04)" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="480" y2="120" stroke="rgba(37,99,235,0.04)" stroke-width="0.5"/>
  <line x1="160" y1="0" x2="160" y2="160" stroke="rgba(37,99,235,0.04)" stroke-width="0.5"/>
  <line x1="320" y1="0" x2="320" y2="160" stroke="rgba(37,99,235,0.04)" stroke-width="0.5"/>

  <!-- Document page (left side) -->
  <rect x="32" y="16" width="80" height="106" rx="4" fill="rgba(37,99,235,0.08)" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>
  <rect x="32" y="16" width="80" height="18" rx="4" fill="rgba(37,99,235,0.15)"/>
  <!-- Document text lines -->
  <rect x="42" y="42" width="50" height="3" rx="1" fill="white" opacity="0.35"/>
  <rect x="42" y="50" width="60" height="3" rx="1" fill="white" opacity="0.3"/>
  <rect x="42" y="58" width="40" height="3" rx="1" fill="white" opacity="0.25"/>
  <rect x="42" y="66" width="55" height="3" rx="1" fill="white" opacity="0.3"/>
  <rect x="42" y="74" width="45" height="3" rx="1" fill="white" opacity="0.25"/>
  <rect x="42" y="82" width="58" height="3" rx="1" fill="white" opacity="0.2"/>
  <rect x="42" y="90" width="38" height="3" rx="1" fill="white" opacity="0.15"/>
  <rect x="42" y="98" width="52" height="3" rx="1" fill="white" opacity="0.12"/>
  <rect x="42" y="106" width="42" height="3" rx="1" fill="white" opacity="0.1"/>

  <!-- Animated scan beam -->
  <rect x="32" y="40" width="80" height="2.5" rx="1" fill="url(#beamGrad)">
    <animate attributeName="y" values="40;112;40" dur="3s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1" repeatCount="indefinite"/>
  </rect>
  <rect x="32" y="40" width="80" height="14" rx="2" fill="#2563eb" opacity="0.04">
    <animate attributeName="y" values="40;112;40" dur="3s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1" repeatCount="indefinite"/>
  </rect>

  <!-- Format badges below document -->
  <rect x="32" y="130" width="32" height="14" rx="3" fill="rgba(37,99,235,0.15)" stroke="rgba(37,99,235,0.25)" stroke-width="0.5"/>
  <text x="48" y="140" font-family="monospace" font-size="7" fill="rgba(37,99,235,0.7)" text-anchor="middle">DOCX</text>
  <rect x="68" y="130" width="24" height="14" rx="3" fill="rgba(217,119,6,0.15)" stroke="rgba(217,119,6,0.25)" stroke-width="0.5"/>
  <text x="80" y="140" font-family="monospace" font-size="7" fill="rgba(217,119,6,0.7)" text-anchor="middle">PDF</text>
  <rect x="96" y="130" width="28" height="14" rx="3" fill="rgba(13,148,136,0.15)" stroke="rgba(13,148,136,0.25)" stroke-width="0.5"/>
  <text x="110" y="140" font-family="monospace" font-size="7" fill="rgba(13,148,136,0.7)" text-anchor="middle">EPUB</text>

  <!-- Flow lines from doc to pipeline center -->
  <line x1="120" y1="40" x2="190" y2="32" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="120" y1="68" x2="190" y2="68" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="120" y1="96" x2="190" y2="104" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- Flowing particles (left to center) -->
  <circle r="3" fill="#2563eb">
    <animate attributeName="cx" values="120;190" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="40;32" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.05" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#60a5fa">
    <animate attributeName="cx" values="120;190" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="68;68" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.05" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#2563eb">
    <animate attributeName="cx" values="120;190" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="96;104" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.05" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Center pipeline box: "Block ADT" -->
  <rect x="196" y="22" width="88" height="92" rx="6" fill="rgba(37,99,235,0.05)" stroke="rgba(37,99,235,0.35)" stroke-width="1.5"/>
  <!-- Pulsing outer ring on the ADT box -->
  <rect x="192" y="18" width="96" height="100" rx="8" stroke="rgba(37,99,235,0.12)" stroke-width="1" fill="none">
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="240" y="41" font-family="monospace" font-size="9" fill="#3b82f6" text-anchor="middle" font-weight="bold">Block ADT</text>
  <!-- Block type labels -->
  <rect x="206" y="50" width="68" height="10" rx="2" fill="rgba(37,99,235,0.1)"/>
  <text x="240" y="58" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.55)" text-anchor="middle">HeadingBlock</text>
  <rect x="206" y="64" width="68" height="10" rx="2" fill="rgba(37,99,235,0.1)"/>
  <text x="240" y="72" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.55)" text-anchor="middle">TableBlock</text>
  <rect x="206" y="78" width="68" height="10" rx="2" fill="rgba(37,99,235,0.1)"/>
  <text x="240" y="86" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.55)" text-anchor="middle">TextBlock</text>
  <rect x="206" y="92" width="68" height="10" rx="2" fill="rgba(37,99,235,0.1)"/>
  <text x="240" y="100" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.55)" text-anchor="middle">ChangeBlock</text>

  <!-- Flow lines from center to output -->
  <line x1="290" y1="32" x2="340" y2="24" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="290" y1="68" x2="340" y2="68" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="290" y1="104" x2="340" y2="112" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.2">
    <animate attributeName="stroke-dashoffset" values="0;-7" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- Flowing particles (center to right) -->
  <circle r="2.5" fill="#3b82f6">
    <animate attributeName="cx" values="290;340" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="32;24" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.05" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#60a5fa">
    <animate attributeName="cx" values="290;340" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="68;68" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.05" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#3b82f6">
    <animate attributeName="cx" values="290;340" dur="1.7s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="104;112" dur="1.7s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.05" dur="1.7s" begin="1.0s" repeatCount="indefinite"/>
  </circle>

  <!-- Output: JSON structured data -->
  <rect x="346" y="12" width="110" height="30" rx="4" fill="rgba(37,99,235,0.06)" stroke="rgba(37,99,235,0.25)" stroke-width="1">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="354" y="24" font-family="monospace" font-size="7" fill="#3b82f6" opacity="0.8" font-weight="bold">JSON</text>
  <rect x="380" y="19" width="66" height="3" rx="1" fill="white" opacity="0.25"/>
  <rect x="354" y="30" width="16" height="3" rx="1" fill="#2563eb" opacity="0.4"/>
  <rect x="374" y="30" width="50" height="3" rx="1" fill="white" opacity="0.2"/>

  <!-- Output: Markdown -->
  <rect x="346" y="52" width="110" height="30" rx="4" fill="rgba(37,99,235,0.06)" stroke="rgba(37,99,235,0.25)" stroke-width="1">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <text x="354" y="64" font-family="monospace" font-size="7" fill="#3b82f6" opacity="0.8" font-weight="bold">Markdown</text>
  <rect x="354" y="70" width="20" height="3" rx="1" fill="#2563eb" opacity="0.4"/>
  <rect x="378" y="70" width="44" height="3" rx="1" fill="white" opacity="0.2"/>

  <!-- Output: Blocks preview -->
  <rect x="346" y="92" width="110" height="30" rx="4" fill="rgba(37,99,235,0.06)" stroke="rgba(37,99,235,0.25)" stroke-width="1">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <text x="354" y="104" font-family="monospace" font-size="7" fill="#3b82f6" opacity="0.8" font-weight="bold">Blocks</text>
  <rect x="354" y="110" width="24" height="3" rx="1" fill="#2563eb" opacity="0.4"/>
  <rect x="382" y="110" width="36" height="3" rx="1" fill="white" opacity="0.2"/>

  <!-- Verification badge (bottom right) -->
  <circle cx="446" cy="140" r="10" fill="rgba(37,99,235,0.15)" stroke="rgba(37,99,235,0.4)" stroke-width="1">
    <animate attributeName="r" values="10;11;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <path d="M441 140l4 4 6-7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Contract count badge -->
  <text x="446" y="126" font-family="monospace" font-size="7" fill="rgba(255,255,255,0.35)" text-anchor="middle">63 contracts</text>
</svg>